# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: lizard

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '10 7 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lizard:
    name: debian amd64
    runs-on: ubuntu-latest
    container: debian:trixie-slim
    timeout-minutes: 30
    steps:
      - name: setup
        run: |
          apt-get -qq -o APT::Acquire::Retries=4 update \
            || (sleep 15; apt-get -qq -o APT::Acquire::Retries=4 update)
          apt-get -qq -o APT::Acquire::Retries=4 -o Dpkg::Use-Pty=0 \
              --no-install-recommends install \
            ca-certificates \
            git \
            pipx
          apt-get -qq -o Dpkg::Use-Pty=0 autoremove
          rm -rf /var/lib/apt/lists/*
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          pipx install lizard
        env:
          DEBIAN_FRONTEND: noninteractive
        shell: bash
      - name: checkout
        uses: actions/checkout@v6
      - name: add problem matcher
        run: |
          echo ::add-matcher::.github/lizard-matcher.json
        shell: bash
      - name: lizard
        run: |
          lizard --CCN 54 src/ examples/ 2>&1 | tee /tmp/lizard-output.txt
        shell: bash
      - name: summary
        if: always()
        run: |
          python3 - <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          lines = open('/tmp/lizard-output.txt').readlines()
          file_hdr = next(
              (i for i, l in enumerate(lines)
               if l.strip().startswith('NLOC') and 'function_cnt' in l), None
          )
          total_hdr = next(
              (i for i, l in enumerate(lines)
               if l.strip().startswith('Total nloc')), None
          )
          if file_hdr is not None:
              headers = lines[file_hdr].split()
              rows = []
              for line in lines[file_hdr + 2:]:
                  s = line.strip()
                  if not s or s.startswith('='):
                      break
                  parts = s.split(None, len(headers) - 1)
                  if parts:
                      rows.append(parts)
              print('## Lizard Complexity')
              print()
              print('| ' + ' | '.join(headers) + ' |')
              print('| ' + ' | '.join(['---'] * len(headers)) + ' |')
              for row in rows:
                  print('| ' + ' | '.join(row) + ' |')
              print()
          if total_hdr is not None:
              cols = ['Total nloc', 'Avg.NLOC', 'AvgCCN', 'Avg.token',
                      'Fun Cnt', 'Warning cnt', 'Fun Rt', 'nloc Rt']
              data = lines[total_hdr + 2].split() if total_hdr + 2 < len(lines) else []
              if data:
                  print('### Totals')
                  print()
                  print('| ' + ' | '.join(cols) + ' |')
                  print('| ' + ' | '.join(['---'] * len(cols)) + ' |')
                  print('| ' + ' | '.join(data) + ' |')
          EOF
        shell: bash
