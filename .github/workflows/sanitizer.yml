# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: sanitizer

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '50 5 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sanitizer-asan:
    name: asan debian amd64
    runs-on: ubuntu-latest
    container: debian:trixie-slim
    timeout-minutes: 60
    steps:
      - name: setup
        run: |
          apt-get -qq -o APT::Acquire::Retries=4 update \
            || (sleep 15; apt-get -qq -o APT::Acquire::Retries=4 update)
          apt-get -qq -o APT::Acquire::Retries=4 -o Dpkg::Use-Pty=0 \
              --no-install-recommends install \
            ca-certificates \
            g++ \
            git \
            meson \
            ninja-build \
            pkgconf
          apt-get -qq -o Dpkg::Use-Pty=0 autoremove
          rm -rf /var/lib/apt/lists/*
        env:
          DEBIAN_FRONTEND: noninteractive
        shell: bash
      - name: checkout
        uses: actions/checkout@v6
      - name: build
        run: |
          meson setup \
            -Db_lto=false \
            -Db_lundef=false \
            -Db_sanitize=address \
            -Dbuildtype=debug \
            -Dopenmp=disabled \
            -Dwerror=true \
            _build
          ninja -C _build
        shell: bash
      - name: test
        env:
          ASAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          LSAN_OPTIONS: print_suppressions=0
        run: |
          meson test -C _build --print-errorlogs
        shell: bash

  sanitizer-tsan:
    name: tsan debian amd64
    runs-on: ubuntu-latest
    container: debian:trixie-slim
    timeout-minutes: 60
    steps:
      - name: setup
        run: |
          apt-get -qq -o APT::Acquire::Retries=4 update \
            || (sleep 15; apt-get -qq -o APT::Acquire::Retries=4 update)
          apt-get -qq -o APT::Acquire::Retries=4 -o Dpkg::Use-Pty=0 \
              --no-install-recommends install \
            ca-certificates \
            g++ \
            git \
            meson \
            ninja-build \
            pkgconf
          apt-get -qq -o Dpkg::Use-Pty=0 autoremove
          rm -rf /var/lib/apt/lists/*
        env:
          DEBIAN_FRONTEND: noninteractive
        shell: bash
      - name: checkout
        uses: actions/checkout@v6
      - name: build
        run: |
          meson setup \
            -Db_lto=false \
            -Db_lundef=false \
            -Db_sanitize=thread \
            -Dbuildtype=debug \
            -Dopenmp=disabled \
            -Dwerror=true \
            _build
          ninja -C _build
        shell: bash
      - name: test
        env:
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
        run: |
          meson test -C _build --print-errorlogs
        shell: bash

  sanitizer-ubsan:
    name: ubsan debian amd64
    runs-on: ubuntu-latest
    container: debian:trixie-slim
    timeout-minutes: 60
    steps:
      - name: setup
        run: |
          apt-get -qq -o APT::Acquire::Retries=4 update \
            || (sleep 15; apt-get -qq -o APT::Acquire::Retries=4 update)
          apt-get -qq -o APT::Acquire::Retries=4 -o Dpkg::Use-Pty=0 \
              --no-install-recommends install \
            ca-certificates \
            g++ \
            git \
            meson \
            ninja-build \
            pkgconf
          apt-get -qq -o Dpkg::Use-Pty=0 autoremove
          rm -rf /var/lib/apt/lists/*
        env:
          DEBIAN_FRONTEND: noninteractive
        shell: bash
      - name: checkout
        uses: actions/checkout@v6
      - name: build
        run: |
          meson setup \
            -Db_lto=false \
            -Db_lundef=false \
            -Db_sanitize=undefined \
            -Dbuildtype=debug \
            -Dopenmp=disabled \
            -Dwerror=true \
            _build
          ninja -C _build
        shell: bash
      - name: test
        env:
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          meson test -C _build --print-errorlogs
        shell: bash
