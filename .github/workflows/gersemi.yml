# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: gersemi

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '00 8 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gersemi:
    name: debian amd64
    runs-on: ubuntu-latest
    container: debian:trixie-slim
    timeout-minutes: 30
    steps:
      - name: setup
        run: |
          apt-get -qq -o APT::Acquire::Retries=4 update \
            || (sleep 15; apt-get -qq -o APT::Acquire::Retries=4 update)
          apt-get -qq -o APT::Acquire::Retries=4 -o Dpkg::Use-Pty=0 \
              --no-install-recommends install \
            ca-certificates \
            git \
            pipx
          apt-get -qq -o Dpkg::Use-Pty=0 autoremove
          rm -rf /var/lib/apt/lists/*
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          pipx install gersemi
        env:
          DEBIAN_FRONTEND: noninteractive
        shell: bash
      - name: checkout
        uses: actions/checkout@v6
      - name: gersemi
        run: gersemi --check .
        shell: bash
