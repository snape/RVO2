---
name: muon

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '40 5 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  muon-build-alpine-amd64:
    name: muon build alpine linux amd64
    runs-on: ubuntu-latest
    container: alpine:3
    timeout-minutes: 20
    steps:
      - name: setup
        run: |
          apk add -q --no-cache \
            acl-static \
            brotli-static \
            bzip2-static \
            ca-certificates \
            curl-dev \
            curl-static \
            expat-static \
            gcc \
            libarchive-dev \
            libarchive-static \
            libidn2-static \
            libpsl-static \
            libunistring-static \
            lz4-static \
            musl-dev \
            nghttp2-static \
            nghttp3-static \
            ninja \
            openssl-libs-static \
            pkgconf-dev \
            xz-static \
            zlib-static \
            zstd-static
        shell: sh
      - name: build
        run: |
          wget -qO- \
            https://github.com/muon-build/muon/archive/refs/tags/0.5.0.tar.gz \
            | tar -xz -C /tmp
          cd /tmp/muon-0.5.0
          ./bootstrap.sh _bootstrap
          _bootstrap/muon-bootstrap setup \
            -Ddefault_library=static \
            -Dstatic=true \
            _build
          ninja -C _build
        shell: sh
      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: muon-linux-amd64
          path: /tmp/muon-0.5.0/_build/muon
          retention-days: 1

  muon-build-alpine-arm64:
    name: muon build alpine linux arm64
    runs-on: ubuntu-24.04-arm
    container: alpine:3
    timeout-minutes: 20
    steps:
      - name: setup
        run: |
          apk add -q --no-cache \
            ca-certificates \
            gcc \
            musl-dev \
            ninja \
            pkgconf-dev
        shell: sh
      - name: build
        run: |
          wget -qO- \
            https://github.com/muon-build/muon/archive/refs/tags/0.5.0.tar.gz \
            | tar -xz -C /tmp
          cd /tmp/muon-0.5.0
          ./bootstrap.sh _bootstrap
          _bootstrap/muon setup \
            -Ddefault_library=static \
            -Dstatic=true \
            _build
          ninja -C _build
        shell: sh
      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: muon-linux-arm64
          path: /tmp/muon-0.5.0/_build/muon
          retention-days: 1

  muon-fmt:
    name: muon fmt
    needs: muon-build-alpine-amd64
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: download muon
        uses: actions/download-artifact@v7
        with:
          name: muon-linux-amd64
          path: .
      - name: muon fmt
        run: |
          install -m 755 muon /usr/local/bin/muon
          find . \( -name 'meson.build' -o -name 'meson.options' \) -print0 \
            | xargs -0 muon fmt -q
        shell: bash

  muon-almalinux:
    name: muon almalinux amd64
    needs: muon-build-alpine-amd64
    runs-on: ubuntu-latest
    container: almalinux:10
    timeout-minutes: 30
    steps:
      - name: setup
        run: |
          dnf makecache -q --refresh || (sleep 15; dnf makecache -q --refresh)
          dnf install -q -y \
            ca-certificates \
            gcc-c++ \
            git \
            glibc-langpack-en \
            ninja-build \
            pkgconf-pkg-config
          dnf clean all
          rm -rf /var/cache/yum
        shell: bash
      - name: checkout
        uses: actions/checkout@v6
      - name: download muon
        uses: actions/download-artifact@v7
        with:
          name: muon-linux-amd64
          path: .
      - name: build test install
        run: |
          install -m 755 muon /usr/local/bin/muon
          muon setup \
            --prefix "$(pwd)/_build/install" \
            -Dopenmp=enabled \
            -Dwerror=true \
            _build
          muon -C _build samu
          muon -C _build test -v
          muon -C _build install
        shell: bash

  muon-alpine:
    name: muon alpine linux amd64
    needs: muon-build-alpine-amd64
    runs-on: ubuntu-latest
    container: alpine:3
    timeout-minutes: 30
    steps:
      - name: setup
        run: |
          apk add -q --no-cache \
            ca-certificates \
            g++ \
            git \
            ninja-build \
            pkgconf
        shell: sh
      - name: checkout
        uses: actions/checkout@v6
      - name: download muon
        uses: actions/download-artifact@v7
        with:
          name: muon-linux-amd64
          path: .
      - name: build test install
        run: |
          install -m 755 muon /usr/local/bin/muon
          muon setup \
            --prefix "$(pwd)/_build/install" \
            -Dopenmp=enabled \
            -Dwerror=true \
            _build
          muon -C _build samu
          muon -C _build test -v
          muon -C _build install
        shell: sh

  muon-arch:
    name: muon arch linux amd64
    needs: muon-build-alpine-amd64
    runs-on: ubuntu-latest
    container: archlinux:latest
    timeout-minutes: 30
    steps:
      - name: setup
        run: |
          pacman --needed --noconfirm --noprogressbar -Sy \
            ca-certificates \
            gcc \
            git \
            pkgconf \
            samu
          rm -rf \
            /var/cache/pacman/pkg/* \
            /var/lib/pacman/sync/*
        shell: bash
      - name: checkout
        uses: actions/checkout@v6
      - name: download muon
        uses: actions/download-artifact@v7
        with:
          name: muon-linux-amd64
          path: .
      - name: build test install
        run: |
          install -m 755 muon /usr/local/bin/muon
          muon setup \
            --prefix "$(pwd)/_build/install" \
            -Dopenmp=enabled \
            -Dwerror=true \
            _build
          samu -C _build
          muon -C _build test -v
          muon -C _build install
        shell: bash

  muon-fedora:
    name: muon fedora linux amd64
    needs: muon-build-alpine-amd64
    runs-on: ubuntu-latest
    container: fedora:44
    timeout-minutes: 30
    steps:
      - name: setup
        run: |
          dnf makecache -q --refresh || (sleep 15; dnf makecache -q --refresh)
          dnf install -q -y \
            ca-certificates \
            gcc-c++ \
            git \
            glibc-langpack-en \
            pkgconf-pkg-config \
            samu
          dnf clean all
          rm -rf /var/cache/yum
        shell: bash
      - name: checkout
        uses: actions/checkout@v6
      - name: download muon
        uses: actions/download-artifact@v7
        with:
          name: muon-linux-amd64
          path: .
      - name: build test install
        run: |
          install -m 755 muon /usr/local/bin/muon
          muon setup \
            --prefix "$(pwd)/_build/install" \
            -Dopenmp=enabled \
            -Dwerror=true \
            _build
          samu -C _build
          muon -C _build test -v
          muon -C _build install
        shell: bash

  muon-macos:
    name: muon macos arm64
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: cache homebrew
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: ${{ runner.os }}-brew-${{ hashFiles('Brewfile') }}
          restore-keys: |
            ${{ runner.os }}-brew-
      - name: setup
        run: |
          brew update -q
          brew bundle install -q
          brew cleanup -q -s
        env:
          HOMEBREW_NO_ANALYTICS: 1
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        shell: zsh -efuo pipefail {0}
      - name: build test install
        run: |
          muon setup \
            --prefix "$PWD/_build/install" \
            -Dopenmp=disabled \
            -Dwerror=true \
            _build
          samu -C _build
          muon -C _build test -v
          muon -C _build install
        shell: zsh -efuo pipefail {0}

  muon-opensuse:
    name: muon opensuse leap amd64
    needs: muon-build-alpine-amd64
    runs-on: ubuntu-latest
    container: opensuse/leap:16.0
    timeout-minutes: 30
    steps:
      - name: setup
        run: |
          zypper -n -q ref || (sleep 15; zypper -n -q ref)
          zypper -n -q in --no-recommends \
            ca-certificates \
            gcc-c++ \
            git \
            pkgconf \
            samu
          zypper -n -q cc -a
        shell: bash
      - name: checkout
        uses: actions/checkout@v6
      - name: download muon
        uses: actions/download-artifact@v7
        with:
          name: muon-linux-amd64
          path: .
      - name: build test install
        run: |
          install -m 755 muon /usr/local/bin/muon
          muon setup \
            --prefix "$(pwd)/_build/install" \
            -Dopenmp=enabled \
            -Dwerror=true \
            _build
          samu -C _build
          muon -C _build test -v
          muon -C _build install
        shell: bash

  muon-ubuntu:
    name: muon ubuntu amd64
    needs: muon-build-alpine-amd64
    runs-on: ubuntu-latest
    container: ubuntu:24.04
    timeout-minutes: 30
    steps:
      - name: setup
        run: |
          apt-get -qq -o APT::Acquire::Retries=4 update \
            || (sleep 15; apt-get -qq -o APT::Acquire::Retries=4 update)
          apt-get -qq -o APT::Acquire::Retries=4 -o Dpkg::Use-Pty=0 \
              --no-install-recommends install \
            ca-certificates \
            g++ \
            git \
            ninja-build \
            pkgconf
          apt-get -qq -o Dpkg::Use-Pty=0 autoremove
          rm -rf /var/lib/apt/lists/*
        env:
          DEBIAN_FRONTEND: noninteractive
        shell: bash
      - name: checkout
        uses: actions/checkout@v6
      - name: download muon
        uses: actions/download-artifact@v7
        with:
          name: muon-linux-amd64
          path: .
      - name: build test install
        run: |
          install -m 755 muon /usr/local/bin/muon
          muon setup \
            --prefix "$(pwd)/_build/install" \
            -Dopenmp=enabled \
            -Dwerror=true \
            _build
          muon -C _build samu
          muon -C _build test -v
          muon -C _build install
        shell: bash

  muon-ubuntu-arm64:
    name: muon ubuntu arm64
    needs: muon-build-alpine-arm64
    runs-on: ubuntu-24.04-arm
    container: ubuntu:24.04
    timeout-minutes: 30
    steps:
      - name: setup
        run: |
          apt-get -qq -o APT::Acquire::Retries=4 update \
            || (sleep 15; apt-get -qq -o APT::Acquire::Retries=4 update)
          apt-get -qq -o APT::Acquire::Retries=4 -o Dpkg::Use-Pty=0 \
              --no-install-recommends install \
            ca-certificates \
            g++ \
            git \
            ninja-build \
            pkgconf
          apt-get -qq -o Dpkg::Use-Pty=0 autoremove
          rm -rf /var/lib/apt/lists/*
        env:
          DEBIAN_FRONTEND: noninteractive
        shell: bash
      - name: checkout
        uses: actions/checkout@v6
      - name: download muon
        uses: actions/download-artifact@v7
        with:
          name: muon-linux-arm64
          path: .
      - name: build test install
        run: |
          install -m 755 muon /usr/local/bin/muon
          muon setup \
            --prefix "$(pwd)/_build/install" \
            -Dopenmp=enabled \
            -Dwerror=true \
            _build
          muon -C _build samu
          muon -C _build test -v
          muon -C _build install
        shell: bash
