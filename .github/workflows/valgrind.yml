# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: valgrind

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  valgrind:
    name: debian amd64
    runs-on: ubuntu-latest
    container: debian:trixie-slim
    timeout-minutes: 60
    steps:
      - name: setup
        run: |
          apt-get -qq -o APT::Acquire::Retries=4 update \
            || (sleep 15; apt-get -qq -o APT::Acquire::Retries=4 update)
          apt-get -qq -o APT::Acquire::Retries=4 -o Dpkg::Use-Pty=0 \
              --no-install-recommends install \
            ca-certificates \
            g++ \
            git \
            meson \
            ninja-build \
            pkgconf \
            valgrind
          apt-get -qq -o Dpkg::Use-Pty=0 autoremove
          rm -rf /var/lib/apt/lists/*
        env:
          DEBIAN_FRONTEND: noninteractive
        shell: bash
      - name: checkout
        uses: actions/checkout@v6
      - name: build
        run: |
          meson setup \
            -Db_lto=false \
            -Dbuildtype=debug \
            -Dopenmp=disabled \
            -Dwerror=true \
            _build
          meson compile -C _build
        shell: bash
      - name: test
        run: |
          meson test -C _build \
            --print-errorlogs \
            --timeout-multiplier 5 \
            --wrapper 'valgrind --error-exitcode=1 --errors-for-leak-kinds=definite,indirect --leak-check=full --show-leak-kinds=definite,indirect --track-origins=yes'
        shell: bash
